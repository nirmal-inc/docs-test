name: Sync External Content

on:
  workflow_dispatch:
    inputs:
      source_name:
        description: "Optional source name from the config file. Leave blank to sync all sources."
        required: false
        type: string
      config_path:
        description: "Optional path to the sync config JSON file."
        required: false
        type: string
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout destination repository
        uses: actions/checkout@v4

      - name: Sync configured sources
        env:
          SOURCE_NAME: ${{ github.event.inputs.source_name || '' }}
          CONFIG_PATH: ${{ github.event.inputs.config_path || vars.SYNC_CONFIG_PATH || '.github/sync-sources.json' }}
          SYNC_SOURCE_TOKEN: ${{ secrets.SYNC_SOURCE_TOKEN || github.token }}
        run: ./scripts/run-sync-sources.sh

      - name: Commit synced changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$(git status --short)" ]]; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync external content"
          git push
